name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build:
    name: Build for production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Prepare backend bundle
        run: |
          mkdir -p deploy/backend
          rsync -av backend/ deploy/backend/ \
            --exclude node_modules \
            --exclude .env

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-src
          path: deploy/backend
          retention-days: 7

  deploy:
    name: Deploy to production
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Download backend artifact
        uses: actions/download-artifact@v5
        with:
          name: backend-src
          path: backend-src

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy backend to server
        run: |
          rsync -az --delete backend-src/ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/glowsuite-production/backend/"

      - name: Copy frontend to server
        run: |
          rsync -az --delete frontend-dist/ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/glowsuite-production/frontend/"

      - name: Restart backend on server
        run: |
          ssh "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << 'EOF'
            cd /var/www/glowsuite-production/backend
            npm ci --omit=dev
            pm2 restart glowsuite-production-api || pm2 start src/server.js --name glowsuite-production-api
          EOF